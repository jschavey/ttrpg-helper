character_info:
  name: "C4-V3"
  aliases: ["Cave", "C4"]
  type: "MerenData Espionage Droid (in Protocol Droid shell)"
  gender: "agender"
  pronouns: "it/its"
  appearance: "Disguised as a standard protocol droid, structurally similar to a 3-PO unit but finished in a stark, matte black plating that absorbs light rather than reflecting it."
  scale: "Character"
  move: 8
  size: 1.7  # meters
  source: "Dark Force Rising Sourcebook (pp. 100-101), Rebel Alliance Sourcebook (pp. 118-120), The Thrawn Trilogy Sourcebook (pp. 195-196)"

backstory: >
  To the casual observer, C4-V3 appears to be nothing more than an eccentric, high-end protocol unit clad in matte black plating, perhaps serving a wealthy underworld figure or a flamboyant merchant. In reality, "Cave" is a precision-engineered MerenData espionage asset. Stripped of the standard corporate subroutines and fitted with an advanced espionage hard-wired module, its polite vocabulator and vast linguistic database serve as the perfect front for high-stakes information gathering, slicing, and counter-intelligence. It operates smoothly in high society or deep undercover, watching every gesture and logging every whisper for its compatriots.

attributes_and_skills:
  DEXTERITY:
    base: "2D"
    skills:
      dodge: "2D+2"
      pick_pocket: "3D"
  
  KNOWLEDGE:
    base: "3D"
    skills:
      cultures: "4D"
      languages: "8D"
      value: "6D"
  
  MECHANICAL:
    base: "2D+1"
    skills:
      communications: "5D+1"
      sensors: "5D+1"
  
  PERCEPTION:
    base: "4D"
    skills:
      con: "6D"
      hide: "6D+1"
      investigation: "6D"
      search: "6D"
      sneak: "6D+1"
  
  STRENGTH:
    base: "2D"
    skills: {}
  
  TECHNICAL:
    base: "3D"
    skills:
      computer_programming: "5D"
      security: "6D"

equipment:
  - "Humanoid body (head, two arms, two legs)"
  - "Information recording and coded retrieval/broadcast system"
  - "Vocabulator speech/sound system"
  - "Broad-band antenna receiver"
  - "AA-1 VerboBrain processor"
  - "TransLand III communication/protocol module"
  - "Espionage hard-wired module"

meta_game:
  force_points: 1
  character_points: 5
  wounds: "Healthy"

